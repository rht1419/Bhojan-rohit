version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: bhojan_dev
      POSTGRES_USER: bhojan
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bhojan:localpassword@postgres:5432/bhojan_dev
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis